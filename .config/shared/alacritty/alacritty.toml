general.import = [
	"~/.config/alacritty/themes/themes/catppuccin-mocha.toml",
	"~/.config/alacritty/keys.toml",
	"~/.config/alacritty/window.toml"
]

[mouse]
hide_when_typing = true

[scrolling]
history = 50000
multiplier = 3

[font]
size = 13
normal = { family = "MesloLGS Nerd Font Mono", style = "Regular" }
bold = { family = "MesloLGS Nerd Font Mono", style = "Bold" }
italic = { family = "MesloLGS Nerd Font Mono", style = "Italic" }
bold_italic = { family = "MesloLGS Nerd Font Mono", style = "Bold Italic" }

[cursor]
style = {shape="Beam", blinking="on"}

[terminal]
osc52 = "OnlyCopy"

[env]
TERM = "alacritty"
