#  ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
#  ┃                                    TMUX CONFIGURATION                                    ┃
#  ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# ===================================
# 1. Plugins
# ===================================
set -g @plugin 'tmux-plugins/tpm'                  # Plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'        # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Highlight when prefix is active
set -g @plugin 'catppuccin/tmux'                   # Theme
set -g @plugin 'tmux-plugins/tmux-resurrect'       # Save/restore sessions

# ===================================
# 2. General Settings
# ===================================
# Terminal settings
set -g escape-time 0                               # No delay on Escape key (vim users)
set -g history-limit 50000                         # Scrollback buffer
set -g set-clipboard on                            # Allow tmux copy-mode to sync with the terminal clipboard

# Window settings
set -g base-index 1                                # Start window index at 1
set -g pane-base-index 1                           # Start pane index at 1
set -g renumber-windows on                         # Renumber windows when one is closed
set -g detach-on-destroy off                       # Don't exit tmux when last window is closed

# Mouse support
set -g mouse on                                    # Enable mouse support

# Window settings
set -g allow-rename off                            # Don't rename windows automatically
set -g automatic-rename off

# ===================================
# 3. Theme Configuration
# ===================================
set -g @catppuccin_flavor 'mocha'                  # Theme variant
set -g @catppuccin_window_status_style "rounded"   # Window status style
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text " #($HOME/.config/tmux/tmux-tab-title #{pane_id})"
set -g @catppuccin_window_current_text " #($HOME/.config/tmux/tmux-tab-title #{pane_id})"
set -g @catppuccin_date_time_text '%m/%d %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'
set -g @catppuccin_pane_border_style "fg=#{@thm_surface_1}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

# Status line configuration
set -g status-right-length 100
set -g status-right "#{prefix_highlight} #{E:@catppuccin_status_date_time}"

# ===================================
# 4. Keybindings
# ===================================
# Prefix
set -g prefix C-a                                  # Change prefix from C-b to C-a
unbind C-b                                         # Remove old prefix
bind C-a send-prefix                               # prefix + C-a: send prefix to nested tmux/remote sessions

# Pane navigation
bind-key h select-pane -L                          # prefix + h: Move left
bind-key j select-pane -D                          # prefix + j: Move down
bind-key k select-pane -U                          # prefix + k: Move up
bind-key l select-pane -R                          # prefix + l: Move right
bind H resize-pane -L 5                            # prefix + H: Resize pane left
bind J resize-pane -D 5                            # prefix + J: Resize pane down
bind K resize-pane -U 5                            # prefix + K: Resize pane up
bind L resize-pane -R 5                            # prefix + L: Resize pane right

# Window operations
bind w choose-tree -Zw                              # Open zoomed session/window/pane tree
bind Tab last-window                               # Jump back to the previous window
bind c new-window -c "#{pane_current_path}"        # New window in current pane directory
bind | split-window -h -c "#{pane_current_path}"   # Split horizontally in current pane directory
bind - split-window -v -c "#{pane_current_path}"   # Split vertically in current pane directory
bind r source-file ~/.tmux.conf \; display "Config reloaded!"  # Reload config

# ===================================
# 5. Copy Mode
# ===================================
# Vi mode
setw -g mode-keys vi                               # Use vi keys in copy mode

# Basic Usage:
#   1. Enter copy mode: prefix + [  (prefix is Ctrl+a)
#   2. Navigation:
#      - h,j,k,l: move cursor
#      - w/b: next/previous word
#      - f/F: find character forward/backward
#      - Ctrl+u/d: page up/down
#      - g/G: go to top/bottom
#   3. Selection:
#      - v: start selection
#      - C-v: rectangle selection
#      - y: copy and exit
#      - q: quit without copying
#   4. Search:
#      - /: search forward
#      - ?: search backward
#      - n/N: next/previous match

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection     # Begin selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle  # Toggle rectangle selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel  # Copy selection

# ===================================
# 6. Plugin Settings
# ===================================
# Prefix Highlight
set -g @prefix_highlight_show_copy_mode 'on'       # Show copy mode
set -g @prefix_highlight_copy_mode_attr 'fg=white,bg=blue'  # Copy mode style

# Other Bindings
bind-key s setw synchronize-panes                  # Toggle sync panes

# Resurrect
# Keep session persistence explicit: prefix + Ctrl+s saves, prefix + Ctrl+r restores.

# ===================================
# 8. Plugin Manager (keep at bottom)
# ===================================
run '~/.tmux/plugins/tpm/tpm'                      # Initialize plugin manager

# Keep after TPM: tmux-sensible resets the default 15s interval to 5s while loading.
set -g status-interval 15

# Keep after TPM: Catppuccin enables a session module on the left by default.
set -g status-left ""
set -g status-left-length 0
