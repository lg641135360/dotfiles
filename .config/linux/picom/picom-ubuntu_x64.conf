# Catppuccin Theme - Picom Configuration
# Optimized for visual aesthetics with good performance

backend = "glx"
glx-no-stencil = true
glx-copy-from-front = false

# ===================== Blur =====================
blur-method = "dual_kawase"
blur-strength = 10
blur-background = true
blur-background-frame = false
blur-background-fixed = false

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'splash'",
  "window_type = 'tooltip'",
  "class_g = 'Polybar'",
  "class_g = 'trayer'",
  "class_g = 'slop'",
  "class_g = 'Slop'",
  "name *= 'slop'",
  "name *= 'Slop'",
  "override_redirect = true",
  "class_g = 'maim'",
  "class_g = 'Maim'"
];

# ===================== Shadows =====================
shadow = true
shadow-radius = 12
shadow-opacity = 0.28
shadow-offset-x = -6
shadow-offset-y = -6
shadow-color = "#000000"

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'",
  "class_g = 'Polybar'",
  "class_g = 'trayer'",
  "class_g = 'tblive'",
  "override_redirect = true",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ===================== Fading =====================
fading = true
fade-in-step = 0.03
fade-out-step = 0.03
fade-delta = 5
fade-exclude = [ "class_g = 'slop'" ];

# ===================== Opacity =====================
inactive-opacity = 0.90
active-opacity = 1.0
frame-opacity = 1.0
inactive-opacity-override = false

# Menu opacity
popup_menu = { opacity = 0.95; }
dropdown_menu = { opacity = 0.95; }

focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",
  "class_g = 'slop'",
  "class_g = 'trayer'"
];

# Opacity rules for specific apps (let terminals use their own opacity/blur)
opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'Thunderbird'"
];

# ===================== Rounded Corners =====================
corner-radius = 12

# Exclude corners for specific apps
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "override_redirect = true",
  "class_g = 'Polybar'"
];

# ===================== Window Types =====================
wintypes:
{
  normal = { fade = false; shadow = true; }
  tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; corner-radius = 12; }
  dock = { shadow = false; fade = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.95; shadow = true; corner-radius = 12; full-shadow = false; }
  dropdown_menu = { opacity = 0.95; shadow = true; corner-radius = 12; full-shadow = false; }
  utility = { shadow = true; corner-radius = 12; }
  toolbar = { shadow = false; }
  menu = { opacity = 0.95; shadow = true; corner-radius = 12; }
  splash = { shadow = false; }
  dialog = { shadow = true; corner-radius = 12; }
  dropdown = { opacity = 0.95; shadow = true; corner-radius = 12; }
};

# ===================== Performance =====================
vsync = true
mark-wmwin-focused = false
mark-ovredir-focused = false
detect-rounded-corners = true
detect-client-opacity = false
use-damage = true
use-ewmh-active-win = true
unredir-if-possible = false
wait-for-sync = false
log-level = "warn"
