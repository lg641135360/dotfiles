[main]
font=Noto Sans CJK SC:size=13
terminal=~/.config/scripts/terminal-wayland
prompt=应用 >
placeholder=输入应用名或命令
icons-enabled=yes
use-bold=yes
lines=14
width=58
horizontal-pad=24
vertical-pad=18
inner-pad=12
image-size-ratio=0.42
line-height=28
fields=name,generic,comment,categories,filename,keywords
dpi-aware=auto
layer=overlay
keyboard-focus=exclusive
match-mode=fuzzy
filter-desktop=yes
show-actions=yes
match-counter=yes

[colors]
background=15161dee
text=d9e0eeff
prompt=94e2d5ff
placeholder=6c7086ff
input=f5e0dcff
match=f9e2afff
selection=2a2d3aff
selection-text=ffffffff
selection-match=f9e2afff
counter=89b4faff
border=94e2d5ff

[border]
radius=10
width=2
selection-radius=6
